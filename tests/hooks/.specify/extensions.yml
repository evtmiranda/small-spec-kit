hooks:
  before_execute:
    - id: pre_test
      enabled: true
      optional: false
      extension: "test-extension"
      command: "pre_execute_test"
      description: "Test before execute hook execution"

  after_execute:
    - id: post_test
      enabled: true
      optional: true
      extension: "test-extension"
      command: "post_execute_test"
      description: "Test after execute hook execution"
      prompt: "Would you like to run the post-execute test?"

  before_plan:
    - id: pre_plan_test
      enabled: true
      optional: false
      extension: "test-extension"
      command: "pre_plan_test"
      description: "Test before plan hook execution"

  after_plan:
    - id: post_plan_test
      enabled: true
      optional: true
      extension: "test-extension"
      command: "post_plan_test"
      description: "Test after plan hook execution"
      prompt: "Would you like to run the post-plan test?"
